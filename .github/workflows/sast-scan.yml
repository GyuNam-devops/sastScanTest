name: SAST Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  semgrep-scan:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep scan
        run: |
          mkdir -p scan-results

          # Run Semgrep with multiple rulesets and save results
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/python \
            --json --output=scan-results/semgrep-results.json || true

          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/python \
            --sarif --output=scan-results/semgrep-results.sarif || true

          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/python \
            --text --output=scan-results/semgrep-results.txt || true

      - name: Generate Semgrep summary
        if: always()
        run: |
          if [ -f scan-results/semgrep-results.json ]; then
            echo "# Semgrep Scan Results" > scan-results/semgrep-summary.txt
            echo "" >> scan-results/semgrep-summary.txt
            echo "Scan completed at: $(date)" >> scan-results/semgrep-summary.txt
            echo "" >> scan-results/semgrep-summary.txt

            python3 << 'PYEOF' >> scan-results/semgrep-summary.txt
import json
try:
    with open('scan-results/semgrep-results.json', 'r') as f:
        data = json.load(f)

    results = data.get('results', [])
    errors = data.get('errors', [])

    print(f"Total findings: {len(results)}")
    print(f"Errors: {len(errors)}")
    print("")

    # Count by severity
    severity_counts = {}
    for result in results:
        severity = result.get('extra', {}).get('severity', 'UNKNOWN')
        severity_counts[severity] = severity_counts.get(severity, 0) + 1

    print("Findings by severity:")
    for severity, count in sorted(severity_counts.items()):
        print(f"  {severity}: {count}")
    print("")

    # Show top 20 findings
    print("Top 20 findings:")
    print("-" * 80)
    for i, result in enumerate(results[:20], 1):
        rule_id = result.get('check_id', 'Unknown')
        severity = result.get('extra', {}).get('severity', 'INFO')
        message = result.get('extra', {}).get('message', 'No message')
        path = result.get('path', 'Unknown')
        line = result.get('start', {}).get('line', '?')

        print(f"\n{i}. [{severity}] {rule_id}")
        print(f"   File: {path}:{line}")
        print(f"   {message[:150]}")

    if len(results) > 20:
        print(f"\n... and {len(results) - 20} more findings")

except Exception as e:
    print(f"Error parsing results: {e}")
PYEOF
          fi

      - name: Upload Semgrep results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-scan-results
          path: scan-results/
          retention-days: 30

  codeql-scan:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download and setup CodeQL CLI
        run: |
          wget -q https://github.com/github/codeql-cli-binaries/releases/latest/download/codeql-linux64.zip
          unzip -q codeql-linux64.zip
          echo "${{ github.workspace }}/codeql" >> $GITHUB_PATH

      - name: Create CodeQL database
        run: |
          codeql database create codeql-db --language=python --source-root=.

      - name: Run CodeQL analysis
        run: |
          mkdir -p scan-results
          codeql database analyze codeql-db \
            --format=sarif-latest \
            --output=scan-results/codeql-results.sarif \
            --download || echo "Analysis completed with warnings"

          codeql database analyze codeql-db \
            --format=csv \
            --output=scan-results/codeql-results.csv \
            --download || echo "CSV export completed"

      - name: Generate human-readable report
        if: always()
        run: |
          if [ -f scan-results/codeql-results.sarif ]; then
            echo "# CodeQL Scan Results" > scan-results/codeql-report.txt
            echo "" >> scan-results/codeql-report.txt
            echo "Scan completed at: $(date)" >> scan-results/codeql-report.txt
            echo "" >> scan-results/codeql-report.txt

            python3 << 'PYEOF' >> scan-results/codeql-report.txt
import json
try:
    with open('scan-results/codeql-results.sarif', 'r') as f:
        data = json.load(f)

    for run in data.get('runs', []):
        results = run.get('results', [])
        print(f"\nTotal findings: {len(results)}\n")

        for i, result in enumerate(results[:50], 1):
            rule_id = result.get('ruleId', 'Unknown')
            message = result.get('message', {}).get('text', 'No message')
            level = result.get('level', 'note')

            locations = result.get('locations', [])
            if locations:
                loc = locations[0].get('physicalLocation', {})
                uri = loc.get('artifactLocation', {}).get('uri', 'Unknown')
                region = loc.get('region', {})
                line = region.get('startLine', '?')
                print(f"{i}. [{level.upper()}] {rule_id}")
                print(f"   File: {uri}:{line}")
                print(f"   Message: {message}\n")
except Exception as e:
    print(f"Error parsing SARIF: {e}")
PYEOF
          fi

          ls -lah scan-results/

      - name: Upload CodeQL results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-scan-results
          path: scan-results/
          retention-days: 30

  summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [semgrep-scan, codeql-scan]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-scan-results

      - name: Generate summary report
        run: |
          echo "# SAST Scan Results Summary" > summary.md
          echo "" >> summary.md
          echo "## Scan Date: $(date)" >> summary.md
          echo "" >> summary.md

          echo "### Semgrep Results" >> summary.md
          if [ -f "all-scan-results/semgrep-scan-results/semgrep-results.json" ]; then
            echo "✅ Semgrep scan completed" >> summary.md
            echo "- Results saved in semgrep-scan-results artifact" >> summary.md
          else
            echo "❌ Semgrep results not found" >> summary.md
          fi
          echo "" >> summary.md

          echo "### CodeQL Results" >> summary.md
          if [ -d "all-scan-results/codeql-scan-results" ]; then
            echo "✅ CodeQL scan completed" >> summary.md
            echo "- Results saved in codeql-scan-results artifact" >> summary.md
          else
            echo "❌ CodeQL results not found" >> summary.md
          fi
          echo "" >> summary.md

          echo "## Download Artifacts" >> summary.md
          echo "Scan results are available in the GitHub Actions artifacts for 30 days." >> summary.md

          cat summary.md

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: scan-summary
          path: summary.md
          retention-days: 30

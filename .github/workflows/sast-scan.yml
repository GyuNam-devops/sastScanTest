name: Security Scan (SAST & SCA)

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ dev ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  semgrep-scan:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep scan
        run: |
          mkdir -p scan-results
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/python \
            --json --output=scan-results/semgrep-results.json || true

      - name: Upload Semgrep results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-scan-results
          path: scan-results/semgrep-results.json
          retention-days: 30
          if-no-files-found: warn

  codeql-scan:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download and setup CodeQL
        run: |
          echo "Downloading CodeQL CLI..."
          wget -q https://github.com/github/codeql-cli-binaries/releases/latest/download/codeql-linux64.zip
          unzip -q codeql-linux64.zip
          echo "${{ github.workspace }}/codeql" >> $GITHUB_PATH

          echo "CodeQL version:"
          ./codeql/codeql version

      - name: Download CodeQL query packs
        run: |
          echo "Downloading Python query packs..."
          ./codeql/codeql pack download codeql/python-queries

      - name: Create CodeQL database
        run: |
          echo "Creating CodeQL database for Python..."
          ./codeql/codeql database create codeql-db \
            --language=python \
            --source-root=.

          echo "Database created successfully"
          ls -lah codeql-db/

      - name: Run CodeQL analysis
        run: |
          echo "Starting CodeQL analysis..."
          mkdir -p scan-results

          echo "Running analysis with Python security queries..."
          ./codeql/codeql database analyze codeql-db \
            codeql/python-queries:codeql-suites/python-security-extended.qls \
            --format=sarif-latest \
            --output=scan-results/codeql-results.sarif \
            --sarif-category=python \
            --verbose || true

          echo "Analysis completed"

          # Check all possible locations
          echo "=== Checking for result files ==="
          find . -name "*.sarif" -type f 2>/dev/null || true
          ls -lah scan-results/ || echo "scan-results directory not found"

          # If file exists, show preview
          if [ -f scan-results/codeql-results.sarif ]; then
            echo "✓ CodeQL results generated successfully"
            wc -l scan-results/codeql-results.sarif
          else
            echo "✗ CodeQL results file not found at expected location"
            echo "Creating empty SARIF file as placeholder"
            python3 -c 'import json; print(json.dumps({"version":"2.1.0","runs":[{"tool":{"driver":{"name":"CodeQL"}},"results":[]}]}))' > scan-results/codeql-results.sarif
          fi

      - name: Upload CodeQL results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-scan-results
          path: scan-results/codeql-results.sarif
          retention-days: 30
          if-no-files-found: warn

  trivy-fs-scan:
    name: Trivy Filesystem SCA Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        run: |
          mkdir -p scan-results

          echo "Running Trivy filesystem scan..."
          docker run --rm -v ${{ github.workspace }}:/scan \
            aquasec/trivy:latest fs /scan \
            --format json \
            --output /scan/scan-results/trivy-fs-results.json \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            --scanners vuln,secret,misconfig || true

          echo "Generating filesystem SBOM (CycloneDX format)..."
          docker run --rm -v ${{ github.workspace }}:/scan \
            aquasec/trivy:latest fs /scan \
            --format cyclonedx \
            --output /scan/scan-results/sbom-fs-cyclonedx.json || true

          echo "Generating filesystem SBOM (SPDX format)..."
          docker run --rm -v ${{ github.workspace }}:/scan \
            aquasec/trivy:latest fs /scan \
            --format spdx-json \
            --output /scan/scan-results/sbom-fs-spdx.json || true

          echo "Trivy filesystem scan completed"
          ls -lah scan-results/

      - name: Upload Trivy filesystem results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-scan-results
          path: scan-results/
          retention-days: 30
          if-no-files-found: warn

  docker-build-scan:
    name: Docker Image Build & Trivy Image Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t pygoat:${{ github.sha }} .
          docker images

      - name: Run Trivy image scanner
        run: |
          mkdir -p scan-results

          echo "Running Trivy image scan for CVE analysis..."
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/scan-results:/output \
            aquasec/trivy:latest image \
            --format json \
            --output /output/trivy-image-results.json \
            --severity CRITICAL,HIGH,MEDIUM,LOW \
            pygoat:${{ github.sha }} || true

          echo "Generating Docker image SBOM (CycloneDX format)..."
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/scan-results:/output \
            aquasec/trivy:latest image \
            --format cyclonedx \
            --output /output/sbom-image-cyclonedx.json \
            pygoat:${{ github.sha }} || true

          echo "Generating Docker image SBOM (SPDX format)..."
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}/scan-results:/output \
            aquasec/trivy:latest image \
            --format spdx-json \
            --output /output/sbom-image-spdx.json \
            pygoat:${{ github.sha }} || true

          echo "Trivy image scan completed"
          ls -lah scan-results/

      - name: Upload Trivy image results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-scan-results
          path: scan-results/
          retention-days: 30
          if-no-files-found: warn

  create-pull-request:
    name: Create Pull Request
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    outputs:
      pr-number: ${{ steps.create-pr.outputs.pr-number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create or update Pull Request
        id: create-pr
        uses: actions/github-script@v7
        with:
          script: |
            // PR이 이미 존재하는지 확인
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:dev`,
              base: 'main',
              state: 'open'
            });

            let prNumber;

            if (pulls.length === 0) {
              // PR이 없으면 새로 생성
              console.log('Creating new PR...');
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔒 Security Scan Results - dev → main',
                head: 'dev',
                base: 'main',
                body: `## 🔒 Automated Security Scan PR

                This PR is automatically created to run security scans and display results.

                ### 🔍 Scans Running:
                - ✅ Semgrep (SAST)
                - ✅ CodeQL (SAST)
                - ✅ Trivy Filesystem (SCA)
                - ✅ Trivy Docker Image Scan

                📊 Scan results will be posted as a comment when completed.

                ---
                🤖 Auto-generated by Security Scan Workflow`
              });
              prNumber = pr.number;
              console.log(`Created PR #${prNumber}`);
            } else {
              // PR이 이미 있으면 해당 번호 사용
              prNumber = pulls[0].number;
              console.log(`Found existing PR #${prNumber}`);
            }

            core.setOutput('pr-number', prNumber);
            return prNumber;

  generate-summary:
    name: Generate Summary Report
    runs-on: ubuntu-latest
    needs: [semgrep-scan, codeql-scan, trivy-fs-scan, docker-build-scan]
    if: always() && (needs.semgrep-scan.result != 'cancelled' || needs.codeql-scan.result != 'cancelled' || needs.trivy-fs-scan.result != 'cancelled' || needs.docker-build-scan.result != 'cancelled')

    steps:
      - name: Download all scan results
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate analysis summary
        run: |
          cat > analysis-summary.md << SUMMARY_EOF
          # Security Scan Analysis Summary

          **Scan Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Repository:** ${{ github.repository }}
          **Branch:** ${{ github.ref_name }}
          **Commit:** ${{ github.sha }}

          ---

          ## Scan Results Overview

          SUMMARY_EOF

          # Semgrep results
          echo "" >> analysis-summary.md
          echo "### 🔍 Semgrep (SAST)" >> analysis-summary.md
          if [ -f artifacts/semgrep-scan-results/semgrep-results.json ]; then
            python3 << 'PYEOF' >> analysis-summary.md
          import json
          try:
              with open('artifacts/semgrep-scan-results/semgrep-results.json', 'r') as f:
                  data = json.load(f)
              results = data.get('results', [])
              errors = data.get('errors', [])

              severity_counts = {}
              for result in results:
                  severity = result.get('extra', {}).get('severity', 'UNKNOWN')
                  severity_counts[severity] = severity_counts.get(severity, 0) + 1

              print(f"- **Total Findings:** {len(results)}")
              print(f"- **Errors:** {len(errors)}")
              if severity_counts:
                  print("- **By Severity:**")
                  for severity in ['ERROR', 'WARNING', 'INFO']:
                      if severity in severity_counts:
                          print(f"  - {severity}: {severity_counts[severity]}")
          except Exception as e:
              print(f"❌ Error parsing Semgrep results: {e}")
          PYEOF
          else
            echo "❌ Semgrep results not found" >> analysis-summary.md
          fi

          # CodeQL results
          echo "" >> analysis-summary.md
          echo "### 🔍 CodeQL (SAST)" >> analysis-summary.md
          if [ -f artifacts/codeql-scan-results/codeql-results.sarif ]; then
            python3 << 'PYEOF' >> analysis-summary.md
          import json
          try:
              with open('artifacts/codeql-scan-results/codeql-results.sarif', 'r') as f:
                  data = json.load(f)

              total_results = 0
              severity_counts = {}

              for run in data.get('runs', []):
                  results = run.get('results', [])
                  total_results += len(results)

                  for result in results:
                      level = result.get('level', 'note')
                      severity_counts[level] = severity_counts.get(level, 0) + 1

              print(f"- **Total Findings:** {total_results}")
              if severity_counts:
                  print("- **By Severity:**")
                  for level in ['error', 'warning', 'note']:
                      if level in severity_counts:
                          print(f"  - {level.upper()}: {severity_counts[level]}")
          except Exception as e:
              print(f"❌ Error parsing CodeQL results: {e}")
          PYEOF
          else
            echo "❌ CodeQL results not found" >> analysis-summary.md
          fi

          # Trivy Filesystem results
          echo "" >> analysis-summary.md
          echo "### 📦 Trivy Filesystem (SCA)" >> analysis-summary.md
          if [ -f artifacts/trivy-fs-scan-results/trivy-fs-results.json ]; then
            python3 << 'PYEOF' >> analysis-summary.md
          import json
          try:
              with open('artifacts/trivy-fs-scan-results/trivy-fs-results.json', 'r') as f:
                  data = json.load(f)

              total_vulns = 0
              severity_counts = {}

              for result in data.get('Results', []):
                  vulns = result.get('Vulnerabilities', [])
                  if vulns:
                      total_vulns += len(vulns)
                      for vuln in vulns:
                          severity = vuln.get('Severity', 'UNKNOWN')
                          severity_counts[severity] = severity_counts.get(severity, 0) + 1

              print(f"- **Total Vulnerabilities:** {total_vulns}")
              if severity_counts:
                  print("- **By Severity:**")
                  for severity in ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW']:
                      if severity in severity_counts:
                          print(f"  - {severity}: {severity_counts[severity]}")
          except Exception as e:
              print(f"❌ Error parsing Trivy filesystem results: {e}")
          PYEOF
          else
            echo "❌ Trivy filesystem results not found" >> analysis-summary.md
          fi

          # Trivy Image results (CVE)
          echo "" >> analysis-summary.md
          echo "### 🐳 Trivy Docker Image (CVE Analysis)" >> analysis-summary.md
          if [ -f artifacts/trivy-image-scan-results/trivy-image-results.json ]; then
            python3 << 'PYEOF' >> analysis-summary.md
          import json
          try:
              with open('artifacts/trivy-image-scan-results/trivy-image-results.json', 'r') as f:
                  data = json.load(f)

              total_vulns = 0
              severity_counts = {}
              cve_ids = []

              for result in data.get('Results', []):
                  vulns = result.get('Vulnerabilities', [])
                  if vulns:
                      for vuln in vulns:
                          total_vulns += 1
                          severity = vuln.get('Severity', 'UNKNOWN')
                          severity_counts[severity] = severity_counts.get(severity, 0) + 1

                          cve_id = vuln.get('VulnerabilityID', '')
                          if cve_id and cve_id.startswith('CVE-'):
                              cve_ids.append(cve_id)

              print(f"- **Total Vulnerabilities:** {total_vulns}")
              print(f"- **Total CVEs:** {len(cve_ids)}")
              if severity_counts:
                  print("- **By Severity:**")
                  for severity in ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW']:
                      if severity in severity_counts:
                          print(f"  - {severity}: {severity_counts[severity]}")

              if cve_ids:
                  critical_cves = []
                  with open('artifacts/trivy-image-scan-results/trivy-image-results.json', 'r') as f:
                      data = json.load(f)
                  for result in data.get('Results', []):
                      for vuln in result.get('Vulnerabilities', []):
                          if vuln.get('Severity') == 'CRITICAL':
                              critical_cves.append(vuln.get('VulnerabilityID', ''))

                  if critical_cves:
                      print(f"\n**Critical CVEs (Top 10):**")
                      for cve in critical_cves[:10]:
                          print(f"- {cve}")

          except Exception as e:
              print(f"❌ Error parsing Trivy image results: {e}")
          PYEOF
          else
            echo "❌ Trivy image results not found" >> analysis-summary.md
          fi

          echo "" >> analysis-summary.md
          echo "---" >> analysis-summary.md
          echo "" >> analysis-summary.md
          echo "## 📦 SBOM (Software Bill of Materials)" >> analysis-summary.md
          echo "" >> analysis-summary.md
          echo "SBOM files generated in multiple formats:" >> analysis-summary.md
          echo "" >> analysis-summary.md
          echo "**Filesystem SBOM:**" >> analysis-summary.md
          echo "- CycloneDX: \`sbom-fs-cyclonedx.json\`" >> analysis-summary.md
          echo "- SPDX: \`sbom-fs-spdx.json\`" >> analysis-summary.md
          echo "" >> analysis-summary.md
          echo "**Docker Image SBOM:**" >> analysis-summary.md
          echo "- CycloneDX: \`sbom-image-cyclonedx.json\`" >> analysis-summary.md
          echo "- SPDX: \`sbom-image-spdx.json\`" >> analysis-summary.md
          echo "" >> analysis-summary.md
          echo "---" >> analysis-summary.md
          echo "" >> analysis-summary.md
          echo "## 📥 Download Full Results" >> analysis-summary.md
          echo "" >> analysis-summary.md
          echo "Detailed scan results are available as artifacts:" >> analysis-summary.md
          echo "- \`semgrep-scan-results\` - Semgrep JSON results" >> analysis-summary.md
          echo "- \`codeql-scan-results\` - CodeQL SARIF results" >> analysis-summary.md
          echo "- \`trivy-fs-scan-results\` - Trivy filesystem scan + SBOM (CycloneDX, SPDX)" >> analysis-summary.md
          echo "- \`trivy-image-scan-results\` - Trivy Docker image scan + SBOM (CycloneDX, SPDX)" >> analysis-summary.md
          echo "" >> analysis-summary.md
          echo "*Artifacts are retained for 30 days*" >> analysis-summary.md

          cat analysis-summary.md

      - name: Upload summary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: analysis-summary
          path: analysis-summary.md
          retention-days: 30

      - name: Add summary to job
        run: |
          cat analysis-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Get PR number from auto-created PR
        id: get-pr-number
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:dev`,
              base: 'main',
              state: 'open'
            });
            if (pulls.length > 0) {
              core.setOutput('pr-number', pulls[0].number);
              return pulls[0].number;
            }
            return '';

      - name: Comment PR with scan results
        if: always() && (github.event_name == 'pull_request' || steps.get-pr-number.outputs.pr-number)
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || steps.get-pr-number.outputs.pr-number }}
          SEMGREP_RESULT: ${{ needs.semgrep-scan.result }}
          CODEQL_RESULT: ${{ needs.codeql-scan.result }}
          TRIVY_FS_RESULT: ${{ needs.trivy-fs-scan.result }}
          DOCKER_SCAN_RESULT: ${{ needs.docker-build-scan.result }}
        with:
          script: |
            const fs = require('fs');
            const runId = context.runId;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
            const prNumber = process.env.PR_NUMBER;

            // Get job results
            const semgrepStatus = process.env.SEMGREP_RESULT === 'success' ? '✅' : '❌';
            const codeqlStatus = process.env.CODEQL_RESULT === 'success' ? '✅' : '❌';
            const trivyFsStatus = process.env.TRIVY_FS_RESULT === 'success' ? '✅' : '❌';
            const dockerStatus = process.env.DOCKER_SCAN_RESULT === 'success' ? '✅' : '❌';

            // Fetch artifacts to get direct download URLs
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            // Create artifact name to URL mapping
            const artifactUrls = {};
            artifacts.data.artifacts.forEach(artifact => {
              artifactUrls[artifact.name] = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}/artifacts/${artifact.id}`;
            });

            // Parse scan results for overview
            let semgrepOverview = '';
            let codeqlOverview = '';
            let trivyFsOverview = '';
            let trivyImageOverview = '';

            try {
              // Semgrep results
              if (fs.existsSync('artifacts/semgrep-scan-results/semgrep-results.json')) {
                const semgrepData = JSON.parse(fs.readFileSync('artifacts/semgrep-scan-results/semgrep-results.json', 'utf8'));
                const results = semgrepData.results || [];
                const errors = semgrepData.errors || [];
                const severityCounts = {};
                results.forEach(r => {
                  const severity = r.extra?.severity || 'UNKNOWN';
                  severityCounts[severity] = (severityCounts[severity] || 0) + 1;
                });

                semgrepOverview = `**🔍 Semgrep (SAST)**\n- Total Findings: ${results.length}\n- Errors: ${errors.length}`;
                if (Object.keys(severityCounts).length > 0) {
                  semgrepOverview += '\n- By Severity:';
                  ['ERROR', 'WARNING', 'INFO'].forEach(sev => {
                    if (severityCounts[sev]) semgrepOverview += `\n  - ${sev}: ${severityCounts[sev]}`;
                  });
                }
              }

              // CodeQL results
              if (fs.existsSync('artifacts/codeql-scan-results/codeql-results.sarif')) {
                const codeqlData = JSON.parse(fs.readFileSync('artifacts/codeql-scan-results/codeql-results.sarif', 'utf8'));
                let totalResults = 0;
                const severityCounts = {};
                (codeqlData.runs || []).forEach(run => {
                  const results = run.results || [];
                  totalResults += results.length;
                  results.forEach(r => {
                    const level = r.level || 'note';
                    severityCounts[level] = (severityCounts[level] || 0) + 1;
                  });
                });

                codeqlOverview = `**🔍 CodeQL (SAST)**\n- Total Findings: ${totalResults}`;
                if (Object.keys(severityCounts).length > 0) {
                  codeqlOverview += '\n- By Severity:';
                  ['error', 'warning', 'note'].forEach(lvl => {
                    if (severityCounts[lvl]) codeqlOverview += `\n  - ${lvl.toUpperCase()}: ${severityCounts[lvl]}`;
                  });
                }
              }

              // Trivy Filesystem results
              if (fs.existsSync('artifacts/trivy-fs-scan-results/trivy-fs-results.json')) {
                const trivyFsData = JSON.parse(fs.readFileSync('artifacts/trivy-fs-scan-results/trivy-fs-results.json', 'utf8'));
                let totalVulns = 0;
                const severityCounts = {};
                (trivyFsData.Results || []).forEach(result => {
                  (result.Vulnerabilities || []).forEach(vuln => {
                    totalVulns++;
                    const severity = vuln.Severity || 'UNKNOWN';
                    severityCounts[severity] = (severityCounts[severity] || 0) + 1;
                  });
                });

                trivyFsOverview = `**📦 Trivy Filesystem (SCA)**\n- Total Vulnerabilities: ${totalVulns}`;
                if (Object.keys(severityCounts).length > 0) {
                  trivyFsOverview += '\n- By Severity:';
                  ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW'].forEach(sev => {
                    if (severityCounts[sev]) trivyFsOverview += `\n  - ${sev}: ${severityCounts[sev]}`;
                  });
                }
              }

              // Trivy Image results
              if (fs.existsSync('artifacts/trivy-image-scan-results/trivy-image-results.json')) {
                const trivyImageData = JSON.parse(fs.readFileSync('artifacts/trivy-image-scan-results/trivy-image-results.json', 'utf8'));
                let totalVulns = 0;
                const severityCounts = {};
                const criticalCves = [];

                (trivyImageData.Results || []).forEach(result => {
                  (result.Vulnerabilities || []).forEach(vuln => {
                    totalVulns++;
                    const severity = vuln.Severity || 'UNKNOWN';
                    severityCounts[severity] = (severityCounts[severity] || 0) + 1;

                    if (severity === 'CRITICAL' && vuln.VulnerabilityID) {
                      criticalCves.push(vuln.VulnerabilityID);
                    }
                  });
                });

                const cveCount = criticalCves.filter(id => id.startsWith('CVE-')).length;
                trivyImageOverview = `**🐳 Trivy Docker Image (CVE Analysis)**\n- Total Vulnerabilities: ${totalVulns}\n- Total CVEs: ${cveCount}`;
                if (Object.keys(severityCounts).length > 0) {
                  trivyImageOverview += '\n- By Severity:';
                  ['CRITICAL', 'HIGH', 'MEDIUM', 'LOW'].forEach(sev => {
                    if (severityCounts[sev]) trivyImageOverview += `\n  - ${sev}: ${severityCounts[sev]}`;
                  });
                }

                if (criticalCves.length > 0) {
                  trivyImageOverview += '\n\n**Critical CVEs (Top 10):**';

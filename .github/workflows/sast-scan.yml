name: SAST Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  semgrep-scan:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep

      - name: Run Semgrep scan
        run: |
          mkdir -p scan-results
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/python \
            --json --output=scan-results/semgrep-results.json || true

      - name: Upload Semgrep results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-scan-results
          path: scan-results/
          retention-days: 30

  codeql-scan:
    name: CodeQL SAST Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download and setup CodeQL CLI
        run: |
          wget -q https://github.com/github/codeql-cli-binaries/releases/latest/download/codeql-linux64.zip
          unzip -q codeql-linux64.zip
          echo "${{ github.workspace }}/codeql" >> $GITHUB_PATH

      - name: Create CodeQL database
        run: |
          codeql database create codeql-db --language=python --source-root=.

      - name: Run CodeQL analysis
        run: |
          mkdir -p scan-results
          codeql database analyze codeql-db \
            --format=sarif-latest \
            --output=scan-results/codeql-results.sarif \
            --download || true

      - name: Convert SARIF to JSON
        if: always()
        run: |
          if [ -f scan-results/codeql-results.sarif ]; then
            cp scan-results/codeql-results.sarif scan-results/codeql-results.json
          fi

      - name: Upload CodeQL results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-scan-results
          path: scan-results/
          retention-days: 30

  summary:
    name: Scan Summary
    runs-on: ubuntu-latest
    needs: [semgrep-scan, codeql-scan]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-scan-results

      - name: List all results
        run: |
          echo "Artifacts downloaded:"
          find all-scan-results -type f -name "*.json" -ls
